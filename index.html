    e("div", {

      e("div", {
        style: {
          position: "absolute", top: "-50px", right: "-50px",

          background: "rgba(255,255,255,0.05)",

            fontSize: "34px",

            marginBottom: "16px",
            fontWeight: 300

        }, "참가안내문"),

            e("span", {
              key: i,
              style: {
                fontSize: "12px",
